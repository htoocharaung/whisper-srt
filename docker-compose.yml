services:
  whisper:
    image: ahmetoner/whisper-asr-webservice:latest
    container_name: whisper-api
    restart: unless-stopped
    # Attach to the n8n-stack_default network where Traefik resides
    networks:
      - n8n-stack_default
    environment:
      - ASR_ENGINE=faster_whisper
      - ASR_MODEL=base
      - ASR_QUANTIZATION=int8
    expose:
      - "9000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=n8n-stack_default"
      
      # Router rule for PathPrefix /whisper
      - "traefik.http.routers.whisper.rule=PathPrefix(`/whisper`)"
      - "traefik.http.routers.whisper.service=whisper"
      - "traefik.http.routers.whisper.middlewares=whisper-strip-prefix"
      
      # Middleware definition to strip /whisper prefix before forwarding
      - "traefik.http.middlewares.whisper-strip-prefix.stripprefix.prefixes=/whisper"
      
      # Point Traefik to internal port 9000
      - "traefik.http.services.whisper.loadbalancer.server.port=9000"
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

# Define the external network to connect to
networks:
  n8n-stack_default:
    external: true
